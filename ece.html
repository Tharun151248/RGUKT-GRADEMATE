    <div class="grade-strip">

        <div class="grade-chip"><span class="gl">A</span> = <span class="gv">9</span></div>
        <div class="grade-chip"><span class="gl">B</span> = <span class="gv">8</span></div>
        <div class="grade-chip"><span class="gl">C</span> = <span class="gv">7</span></div>
        <div class="grade-chip"><span class="gl">D</span> = <span class="gv">6</span></div>
        <div class="grade-chip"><span class="gl">E</span> = <span class="gv">5</span></div>

    <div id="semTabs" class="sem-tabs"></div>
    <div id="subjectsGrid" class="subjects-grid"></div>
    <div class="btn-row"><button class="btn-primary" onclick="calculateSGPA()">Calculate SGPA</button></div>
    <section id="resultArea" class="result-area">
        <div class="result-card">
            <div class="result-label">Your SGPA</div>
            <div class="result-value" id="sgpaValue">0.00</div>
            <div class="result-remark" id="sgpaRemark"></div>
            <div class="breakdown">

                <table class="breakdown-table"><thead><tr><th>Subject</th><th>Grade</th><th>Credit</th><th>Points</th></tr></thead><tbody id="breakdownBody"></tbody></table>
            </div>
            <button class="btn-secondary" onclick="resetAll()" style="margin-top:24px">↺ Reset All</button>
        </div>
    </section>
    <footer class="site-footer"><p>Made with <span>♥</span> for RGUKT students · <a href="index.html">SGPA Calculator</a></p></footer>
